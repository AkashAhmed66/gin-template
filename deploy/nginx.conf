# /etc/nginx/sites-available/gin-template
#
# Drop into /etc/nginx/sites-available/, symlink into sites-enabled/, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# After Let's Encrypt provisions certs (certbot --nginx -d api.yourdomain.com),
# certbot will edit this file in place to add the SSL block.

# -----------------------------------------------------------------------------
# Upstream — keep it named so cert renewal / blue-green swaps are easy.
# -----------------------------------------------------------------------------
upstream gin_template {
    server 127.0.0.1:8080 fail_timeout=5s max_fails=3;
    keepalive 32;
}

# -----------------------------------------------------------------------------
# Plain HTTP — redirect everything to HTTPS once you have certs.
# Keep /health reachable without redirect so external probes work pre-TLS.
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.yourdomain.com;

    # ACME http-01 challenge (certbot writes here)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        proxy_pass http://gin_template;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# -----------------------------------------------------------------------------
# HTTPS — this is the block that does the real work.
# -----------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.yourdomain.com;

    # certbot fills these in via `certbot --nginx -d api.yourdomain.com`
    ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ---- size limits -------------------------------------------------------
    # File uploads endpoint is POST /api/v1/files/upload; default is 1 MB.
    # Bump to match STORAGE_MAX_UPLOAD_SIZE on the app side (10 MB default).
    client_max_body_size 16M;

    # ---- security headers --------------------------------------------------
    add_header X-Frame-Options              "DENY"        always;
    add_header X-Content-Type-Options       "nosniff"     always;
    add_header Referrer-Policy              "no-referrer" always;
    add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains; preload" always;

    # ---- gzip --------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # ---- access logging ----------------------------------------------------
    access_log /var/log/nginx/gin-template.access.log;
    error_log  /var/log/nginx/gin-template.error.log warn;

    # ---- proxy to Go app ---------------------------------------------------
    location / {
        proxy_pass http://gin_template;

        # Standard reverse-proxy headers — the app reads X-Real-IP for audit logs.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Request-Id      $request_id;

        # Keepalive to the upstream
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # Timeouts — generous to allow slow handlers (file uploads, reports).
        # Pair with SERVER_READ_TIMEOUT / SERVER_WRITE_TIMEOUT on the app side.
        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Don't buffer large response bodies (e.g. file downloads).
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # ---- Swagger UI --------------------------------------------------------
    # Same upstream; just here to document the URL. Remove this block in prod
    # if you don't want the spec exposed.
    location /swagger/ {
        proxy_pass http://gin_template;
        proxy_set_header Host             $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
