<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password reset</title>
</head>
<body style="font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#f6f8fb; margin:0; padding:24px;">
  <table align="center" cellpadding="0" cellspacing="0" width="560" style="background:#fff; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,0.06);">
    <tr>
      <td style="padding:32px;">
        <h1 style="margin:0 0 16px 0; font-size:22px; color:#1f2937;">Reset your password</h1>
        <p style="color:#374151; line-height:1.6;">
          Hi {{ .Username }}, click the button below to set a new password. This link expires in {{ .TTL }}.
        </p>
        <p style="margin:24px 0;">
          <a href="{{ .ResetURL }}" style="background:#dc2626; color:#fff; padding:12px 20px; border-radius:6px; text-decoration:none; display:inline-block;">
            Reset password
          </a>
        </p>
        <p style="color:#6b7280; font-size:13px; line-height:1.5;">
          If the button doesn't work, copy and paste this URL:<br>
          <span style="word-break:break-all; color:#374151;">{{ .ResetURL }}</span>
        </p>
        <p style="color:#6b7280; font-size:13px; margin-top:32px;">
          If you didn't request this, you can safely ignore this email — your password won't change.
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
