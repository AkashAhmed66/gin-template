<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome</title>
</head>
<body style="font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; background:#f6f8fb; margin:0; padding:24px;">
  <table align="center" cellpadding="0" cellspacing="0" width="560" style="background:#fff; border-radius:8px; box-shadow:0 1px 4px rgba(0,0,0,0.06);">
    <tr>
      <td style="padding:32px 32px 8px 32px;">
        <h1 style="margin:0 0 16px 0; font-size:22px; color:#1f2937;">Welcome, {{ .Username }}!</h1>
        <p style="color:#374151; line-height:1.6;">
          Your account has been created. You can now sign in and start using the application.
        </p>
        <p style="margin:24px 0;">
          <a href="{{ .AppURL }}" style="background:#2563eb; color:#fff; padding:12px 20px; border-radius:6px; text-decoration:none; display:inline-block;">
            Open the app
          </a>
        </p>
        <p style="color:#6b7280; font-size:13px; line-height:1.5;">
          If you didn't sign up for this account, you can safely ignore this email.
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
